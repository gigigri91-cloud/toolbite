<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Tools | ToolBite</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <meta name="description" content="Find a ToolBite utility by name or keyword.">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/global.css">

  <meta name="google-adsense-account" content="ca-pub-5233222002046639">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5233222002046639" crossorigin="anonymous"></script>

  <meta name="robots" content="noindex">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

  <header class="bg-white shadow-md py-2 sticky top-0 z-50">
    <div class="flex justify-between items-center max-w-7xl mx-auto px-4">
      <a href="index.html" class="flex items-center">
        <img src="assets/images/toolbite-logo.png" alt="ToolBite Logo" class="header-logo">
      </a>
      <nav class="hidden md:block">
        <ul class="flex space-x-8 items-center font-bold text-lg text-gray-700">
          <li><a href="index.html" class="hover:text-orange-500 transition">Home</a></li>
          <li><a href="categories/text-tools.html" class="hover:text-orange-500 transition">Text Tools</a></li>
          <li><a href="categories/developer-tools.html" class="hover:text-orange-500 transition">Developer Tools</a></li>
          <li><a href="contact.html" class="hover:text-orange-500 transition">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="flex-grow max-w-3xl mx-auto px-4 py-10 w-full">
    <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Search tools</h1>
    <p class="text-gray-600 mb-6">Type a tool name or keyword.</p>

    <form action="search.html" method="get" class="mb-10 flex gap-2">
      <input type="search" name="q" id="search-q" value="" placeholder="e.g. JSON, password, word…"
        class="flex-grow p-4 rounded-xl border border-gray-200 shadow-sm focus:ring-4 focus:ring-orange-200 focus:border-orange-400 outline-none text-gray-800">
      <button type="submit" class="px-6 py-4 bg-orange-500 text-white font-bold rounded-xl hover:bg-orange-600 transition shrink-0">Search</button>
    </form>

    <div id="results-wrap" class="space-y-3"></div>
  </main>

  <footer class="bg-white border-t border-gray-200 p-10 text-center mt-auto">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-gray-500 font-medium">&copy; <span id="current-year"></span> ToolBite.org. All rights reserved.</p>
      <div class="space-x-4 text-sm font-medium">
        <a href="privacy.html" class="text-gray-500 hover:text-blue-600 transition">Privacy Policy</a>
        <a href="terms.html" class="text-gray-500 hover:text-blue-600 transition">Terms of Service</a>
        <a href="about.html" class="text-gray-500 hover:text-blue-600 transition">About Us</a>
        <a href="contact.html" class="text-gray-500 hover:text-blue-600 transition">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById("current-year").textContent = new Date().getFullYear();

    var TOOLS = [
      { title: "Word Counter", desc: "Count words, characters, sentences, and paragraphs.", href: "tools/word-counter.html", k: "word counter character count essay length paragraph seo" },
      { title: "Password Generator", desc: "Create strong random passwords in your browser.", href: "tools/password-generator.html", k: "password generator secure random strong login" },
      { title: "JSON Formatter", desc: "Beautify, minify, and validate JSON.", href: "tools/json-formatter.html", k: "json format validate developer api pretty print" },
      { title: "Find & Replace", desc: "Find and replace text with optional case sensitivity.", href: "tools/find-replace.html", k: "find replace text search substitute bulk" },
      { title: "Color Palette Generator", desc: "Random palettes with HEX codes ready to copy.", href: "tools/color-palette-generator.html", k: "color palette hex design css random" },
      { title: "Image Compressor", desc: "Shrink JPG, PNG, or WebP files locally.", href: "tools/image-compressor.html", k: "image compress photo jpeg png webp size" },
      { title: "Lorem Ipsum Generator", desc: "Generate placeholder paragraphs for layouts.", href: "tools/lorem-ipsum.html", k: "lorem ipsum dummy text placeholder filler" },
      { title: "Remove Extra Spaces", desc: "Collapse spaces and clean up pasted text.", href: "tools/remove-extra-spaces.html", k: "remove spaces trim whitespace clean text" }
    ];

    function norm(s) { return (s || "").toLowerCase().trim(); }

    function runSearch() {
      var params = new URLSearchParams(window.location.search);
      var q = norm(params.get("q"));
      var input = document.getElementById("search-q");
      if (input) input.value = params.get("q") || "";

      var wrap = document.getElementById("results-wrap");
      if (!wrap) return;

      var list = TOOLS;
      if (q) {
        list = TOOLS.filter(function (t) {
          return norm(t.title).indexOf(q) !== -1 || norm(t.k).indexOf(q) !== -1 || norm(t.desc).indexOf(q) !== -1;
        });
      }

      if (!list.length) {
        wrap.textContent = "";
        var emptyP = document.createElement("p");
        emptyP.className = "text-gray-600";
        emptyP.appendChild(document.createTextNode('No tools matched "' + (params.get("q") || "") + '". Try another keyword or '));
        var homeA = document.createElement("a");
        homeA.href = "index.html";
        homeA.className = "text-blue-600 underline";
        homeA.textContent = "browse the homepage";
        emptyP.appendChild(homeA);
        emptyP.appendChild(document.createTextNode("."));
        wrap.appendChild(emptyP);
        return;
      }

      var html = (q ? "<p class=\"text-sm text-gray-500 mb-4\">" + list.length + " result(s)</p>" : "<p class=\"text-sm text-gray-500 mb-4\">All tools</p>");
      html += '<ul class="space-y-3">';
      list.forEach(function (t) {
        html += '<li><a href="' + t.href + '" class="block bg-white border border-gray-100 rounded-xl p-4 shadow-sm hover:shadow-md hover:border-orange-200 transition"><span class="font-bold text-gray-900">' + t.title + '</span><span class="block text-sm text-gray-500 mt-1">' + t.desc + '</span></a></li>';
      });
      html += "</ul>";
      wrap.innerHTML = html;
    }

    runSearch();
  </script>
</body>
</html>

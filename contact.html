<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ToolBite</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <meta name="description" content="Get in touch with the ToolBite team for support, feature requests, or partnership inquiries.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/global.css">

    <meta name="google-adsense-account" content="ca-pub-5233222002046639">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5233222002046639" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <header class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-4">
            <a href="index.html" class="flex items-center gap-3 py-2 group">
                <img src="assets/images/toolbite-logo.png" alt="ToolBite Logo" class="header-logo transition-transform duration-300 group-hover:scale-105">
            </a>
            <nav class="hidden md:block">
                <ul class="flex space-x-6 items-center font-medium">
                    <li><a href="index.html" class="hover:text-orange-500 transition">Home</a></li>
                    <li><a href="categories/text-tools.html" class="hover:text-orange-500 transition">Text Tools</a></li>
                    <li><a href="categories/developer-tools.html" class="hover:text-orange-500 transition">Developer Tools</a></li>
                    <li><a href="contact.html" class="text-blue-600 font-bold transition">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-16 w-full text-center">
        
        <div class="mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4">Get in <span class="text-blue-600">Touch</span></h1>
            <p class="text-xl text-gray-600">Have a tool request or found a bug? We'd love to hear from you.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-gray-100 text-left">
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT" method="POST" class="space-y-6">
                
                <div>
                    <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Your Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 hover:bg-white focus:bg-white">
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 hover:bg-white focus:bg-white">
                </div>

                <div>
                    <label for="message" class="block text-sm font-semibold text-gray-700 mb-2">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="How can we help you today?" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-y bg-gray-50 hover:bg-white focus:bg-white"></textarea>
                </div>

                <button type="submit" class="w-full py-4 bg-blue-600 text-white font-bold text-lg rounded-xl hover:bg-blue-700 transition duration-300 shadow-md transform hover:-translate-y-1">
                    Send Message
                </button>
            </form>

            <div class="text-center mt-10 pt-8 border-t border-gray-100">
                <p class="text-gray-500">Or email us directly at: <br><a href="mailto:contact@toolbite.org" class="text-blue-600 font-bold hover:underline text-lg">contact@toolbite.org</a></p>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-200 p-10 text-center mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-gray-500 font-medium">&copy; <span id="current-year"></span> ToolBite.org. All rights reserved.</p>
            <div class="space-x-4 text-sm font-medium">
                <a href="privacy.html" class="text-gray-500 hover:text-blue-600 transition">Privacy Policy</a>
                <a href="terms.html" class="text-gray-500 hover:text-blue-600 transition">Terms of Service</a>
                <a href="about.html" class="text-gray-500 hover:text-blue-600 transition">About Us</a>
                <a href="contact.html" class="text-blue-600 font-bold transition">Contact</a>
            </div>
        </div>
    </footer>

    <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="toolbite" data-description="Support our free tools!" data-message="☕ Keep ToolBite 100% free & lightning fast! Buy me a coffee!" data-color="#FF813F" data-position="Right" data-x_margin="18" data-y_margin="18"></script>
    
    <script>
        document.getElementById("current-year").textContent = new Date().getFullYear();
    </script>
</body>
</html>

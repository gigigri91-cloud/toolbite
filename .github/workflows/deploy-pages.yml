name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "astro/package-lock.json"

      - name: Install Astro dependencies
        working-directory: astro
        run: npm ci

      - name: Validate metadata/discovery governance
        working-directory: astro
        run: |
          npm run generate:sitemap
          npm run validate:seo
          npm run validate:discovery

      - name: Build Astro canonical artifact
        working-directory: astro
        run: npm run build

      - name: Compose deploy artifact and validate parity
        working-directory: astro
        run: |
          npm run compose:deploy-artifact
          npm run validate:assets:deploy

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

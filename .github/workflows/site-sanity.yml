name: Site Sanity Checks

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run static site sanity checks
        run: python3 scripts/site_sanity_check.py

      - name: Verify SEO metadata matches data/seo.json
        run: python3 scripts/seo_metadata.py --check

      - name: Run internal link checks
        run: python3 scripts/check_internal_links.py

      - name: Run HTML structure and page-family checks
        run: python3 scripts/validate_html_structure.py

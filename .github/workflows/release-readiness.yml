name: Release Readiness Check

on:
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Collect Lighthouse reports from live site
        run: npx @lhci/cli@0.14.x collect --config=.lighthouserc.json

      - name: Assert Lighthouse thresholds
        run: npx @lhci/cli@0.14.x assert --config=.lighthouserc.json

      - name: Upload Lighthouse reports to temporary public storage
        run: npx @lhci/cli@0.14.x upload --config=.lighthouserc.json

      - name: Upload Lighthouse artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-lighthouse
          path: .lighthouseci
          if-no-files-found: warn

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TOOL_NAME}} | Toolbite</title>
  <meta name="description" content="{{TOOL_DESCRIPTION}}" />

  <link rel="canonical" href="https://toolbite.org/tools/{{TOOL_SLUG}}.html" />

  <meta property="og:type" content="article" />
  <meta property="og:site_name" content="Toolbite" />
  <meta property="og:title" content="{{TOOL_NAME}} | Toolbite" />
  <meta property="og:description" content="{{TOOL_DESCRIPTION}}" />
  <meta property="og:url" content="https://toolbite.org/tools/{{TOOL_SLUG}}.html" />
  <meta property="og:image" content="https://toolbite.org/assets/images/og-image.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{TOOL_NAME}} | Toolbite" />
  <meta name="twitter:description" content="{{TOOL_DESCRIPTION}}" />
  <meta name="twitter:image" content="https://toolbite.org/assets/images/og-image.png" />
</head>
<body>
  <main>
    <!-- Tool content -->
  </main>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebApplication",
        "@id": "https://toolbite.org/tools/{{TOOL_SLUG}}.html#webapp",
        "name": "{{TOOL_NAME}}",
        "description": "{{TOOL_DESCRIPTION}}",
        "url": "https://toolbite.org/tools/{{TOOL_SLUG}}.html",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "publisher": { "@id": "https://toolbite.org/#organization" }
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://toolbite.org" },
          { "@type": "ListItem", "position": 2, "name": "{{TOOL_CATEGORY}}", "item": "https://toolbite.org/categories/{{TOOL_CATEGORY_SLUG}}.html" },
          { "@type": "ListItem", "position": 3, "name": "{{TOOL_NAME}}", "item": "https://toolbite.org/tools/{{TOOL_SLUG}}.html" }
        ]
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is {{TOOL_NAME}} free?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes, completely free. No signup required, no usage limits." }
          },
          {
            "@type": "Question",
            "name": "Is my data safe when using {{TOOL_NAME}}?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. All processing happens in your browser. Your data is never sent to any server." }
          }
        ]
      }
    ]
  }
  </script>
</body>
</html>

<!-- assets/html/head-tool.html -->
<!-- Tool page-specific meta -->
<!-- Template variables: {toolName}, {toolDescription}, {pageUrl} -->
<title>{toolName} | ToolBite</title>
<meta name="description" content="{toolDescription}">
<link rel="canonical" href="{pageUrl}">
<meta name="theme-color" content="#01696f">
<meta name="author" content="ToolBite">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolBite">
<meta property="og:url" content="{pageUrl}">
<meta property="og:title" content="{toolName} | ToolBite">
<meta property="og:description" content="{toolDescription}">
<meta property="og:image" content="https://toolbite.org/assets/images/social-preview.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="en_US">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@toolbite">
<meta name="twitter:creator" content="@toolbite">
<meta name="twitter:title" content="{toolName} | ToolBite">
<meta name="twitter:description" content="{toolDescription}">
<meta name="twitter:image" content="https://toolbite.org/assets/images/social-preview.jpg">

<!-- assets/html/header.html -->
<!--
  Reusable header component for all pages.
  Path variables are replaced during injection:
  - {pathPrefix} = relative path to root ("", "../", "../../", etc.)
  - {homeActive} = "text-orange-700 " if home page, else ""
  - {guidesActive} = "text-orange-500 " if guides page, else ""
  - {contactActive} = "text-orange-500 " if contact page, else ""
-->

<header id="site-header" class="bg-white dark:bg-gray-800 shadow-md py-2 md:py-2.5 sticky top-0 z-50">
  <div class="flex justify-between items-center gap-1 sm:gap-3 max-w-7xl mx-auto px-4">
    <a href="{pathPrefix}/" class="group flex items-center min-w-0 shrink leading-none">
      <picture class="header-logo-picture">
        <source srcset="{pathPrefix}assets/images/toolbite-logo.webp" type="image/webp">
        <img src="{pathPrefix}assets/images/toolbite-logo.png" alt="ToolBite Logo" width="384" height="106" class="h-10 w-auto">
      </picture>
    </a>
    <nav class="hidden md:block" aria-label="Main">
      <ul class="flex flex-wrap justify-end gap-x-5 lg:gap-x-7 gap-y-1 items-center font-bold text-sm lg:text-base text-gray-700 dark:text-gray-300">
        <li><a href="{pathPrefix}/" class="{homeActive}hover:text-orange-500 transition">Home</a></li>
        <li><a href="{pathPrefix}categories/text-tools.html" class="hover:text-orange-500 transition">Text</a></li>
        <li><a href="{pathPrefix}categories/developer-tools.html" class="hover:text-orange-500 transition">Developer</a></li>
        <li><a href="{pathPrefix}categories/image-tools.html" class="hover:text-orange-500 transition">Image</a></li>
        <li><a href="{pathPrefix}categories/seo-tools.html" class="hover:text-orange-500 transition">SEO</a></li>
        <li><a href="{pathPrefix}guides/index.html" class="{guidesActive}hover:text-orange-500 transition">Guides</a></li>
        <li><a href="{pathPrefix}contact.html" class="{contactActive}hover:text-orange-500 transition">Contact</a></li>
      </ul>
    </nav>
    <button id="theme-toggle" type="button" class="theme-toggle-btn" aria-label="Toggle theme"></button>
    <button id="mobile-menu-button" class="tb-btn tb-btn-icon tb-mobile-menu-btn md:hidden focus:outline-none" aria-expanded="false" aria-controls="mobile-menu" aria-label="Open menu">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
      </svg>
    </button>
  </div>
  <div id="mobile-menu" class="hidden md:hidden bg-gray-50 dark:bg-gray-700 border-t border-gray-200 dark:border-gray-600 mt-1 rounded-b-xl shadow-inner">
    <ul class="flex flex-col space-y-4 p-6 font-bold text-lg text-gray-700 dark:text-gray-300 text-center">
      <li><a href="{pathPrefix}/" class="block {homeActive}hover:text-orange-500 transition">Home</a></li>
      <li><a href="{pathPrefix}categories/text-tools.html" class="block hover:text-orange-500 transition">Text</a></li>
      <li><a href="{pathPrefix}categories/developer-tools.html" class="block hover:text-orange-500 transition">Developer</a></li>
      <li><a href="{pathPrefix}categories/image-tools.html" class="block hover:text-orange-500 transition">Image</a></li>
      <li><a href="{pathPrefix}categories/seo-tools.html" class="block hover:text-orange-500 transition">SEO</a></li>
      <li><a href="{pathPrefix}guides/index.html" class="block {guidesActive}hover:text-orange-500 transition">Guides</a></li>
      <li><a href="{pathPrefix}contact.html" class="block {contactActive}hover:text-orange-500 transition">Contact</a></li>
    </ul>
  </div>
</header>

<!-- assets/html/head-generic.html -->
<!-- Generic page-specific meta (customize title, description, url per page) -->
<!-- Template variables: {pageTitle}, {pageDescription}, {pageUrl}, {pageImage} -->
<title>{pageTitle}</title>
<meta name="description" content="{pageDescription}">
<link rel="canonical" href="{pageUrl}">
<link rel="alternate" hreflang="x-default" href="{pageUrl}">
<link rel="alternate" hreflang="en" href="{pageUrl}">
<meta name="theme-color" content="#01696f">
<link rel="preload" as="image" href="{assetPath}assets/images/toolbite-logo.webp" type="image/webp" fetchpriority="high">
<meta name="author" content="ToolBite">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ToolBite">
<meta property="og:url" content="{pageUrl}">
<meta property="og:title" content="{pageTitle}">
<meta property="og:description" content="{pageDescription}">
<meta property="og:image" content="{pageImage}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="en_US">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@toolbite">
<meta name="twitter:creator" content="@toolbite">
<meta name="twitter:title" content="{pageTitle}">
<meta name="twitter:description" content="{pageDescription}">
<meta name="twitter:image" content="{pageImage}">

        <h2 class="text-2xl font-bold text-gray-900 mb-4">About Lorem Ipsum</h2>
        <p>Lorem Ipsum has been the printing industry's standard dummy text since the 1500s. Designers use it when the final copy isn't ready so viewers can focus on layout rather than readable content.</p>
      
      <div class="mt-6 space-y-4 text-gray-700">
        <h3 class="text-xl font-bold text-gray-900">Why Designers Use Lorem Ipsum</h3>
        <p>When presenting a design mockup or prototype, real text can be distracting — clients and stakeholders start editing the words instead of evaluating the layout. Lorem Ipsum solves this by providing text that looks natural at a glance but is meaningless to readers, keeping attention on spacing, typography, and visual hierarchy.</p>
        <h3 class="text-xl font-bold text-gray-900 mt-6">Origin of Lorem Ipsum</h3>
        <p>Contrary to popular belief, Lorem Ipsum is not simply random Latin. It is derived from sections 1.10.32 and 1.10.33 of "de Finibus Bonorum et Malorum" (On the Ends of Good and Evil) by the Roman philosopher Cicero, written in 45 BC. The standard Lorem Ipsum passage used since the 1500s begins with "Lorem ipsum dolor sit amet..." — a scrambled and altered excerpt from the original text.</p>
        <h3 class="text-xl font-bold text-gray-900 mt-6">When Not to Use Lorem Ipsum</h3>
        <p>For content-heavy applications like news sites, e-commerce product pages, or dashboards, always test with realistic content as early as possible. Different word lengths and paragraph structures can significantly affect layout behavior, especially on mobile screens.</p>
      </div>
